version: '3.8'

services:
  # 1. FastAPI Backend
  backend:
    build: ./backend
    container_name: fastapi_backend
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app  # Změny v kódu se projeví hned (hot-reload)
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db

  # 2. PostgreSQL Databáze
  db:
    image: postgres:15-alpine
    container_name: postgres_db
    volumes:
      - postgres_data:/var/lib/postgresql/data # Aby data nezmizela po vypnutí
    env_file:
      - .env
    ports:
      - "5432:5432"

  # 3. Nástroj pro správu DB (Adminer)
  adminer:
    image: adminer
    container_name: db_adminer
    ports:
      - "8080:8080"
    depends_on:
      - db

volumes:
  postgres_data: